claim_utterance:
  name: Claim utterance
  description: >-
    Enroll a pending (unrecognized) utterance as a voice sample of a person.
    The person is created automatically if missing. This is the tool for the
    LLM "who are you?" flow — pass the utterance_id from the Transcript event.
  fields:
    name:
      name: Person name
      required: true
      example: "Krzysztof"
      selector:
        text:
    utterance_id:
      name: Utterance id
      required: true
      example: "utt-1783019986769-0f99505f"
      selector:
        text:
    include_cluster:
      name: Include voice cluster
      description: Also claim all other pending clips of the same voice (recommended).
      default: true
      selector:
        boolean:

claim_latest:
  name: Claim latest utterance
  description: >-
    Enroll the most recent unrecognized utterance (and all buffered clips of
    the same voice) as a person's samples. The LLM tool for the "who are
    you?" flow — call it right after the person answers with their name; no
    utterance_id needed. Refuses when the newest clip is older than
    max_age_seconds (the answer may have been too short to buffer).
  fields:
    name:
      name: Person name
      required: true
      example: "Anna"
      selector:
        text:
    include_cluster:
      name: Include voice cluster
      description: Also claim all other pending clips of the same voice (recommended).
      default: true
      selector:
        boolean:
    max_age_seconds:
      name: Maximum clip age (seconds)
      description: Refuse to claim when the newest pending clip is older than this.
      default: 300
      selector:
        number:
          min: 10
          max: 3600
          unit_of_measurement: s

set_role:
  name: Set speaker role
  description: Set the authorization role of an enrolled person (admin/user/guest).
  fields:
    name:
      name: Person name
      required: true
      example: "Krzysztof"
      selector:
        text:
    role:
      name: Role
      required: true
      selector:
        select:
          options:
            - admin
            - user
            - guest
