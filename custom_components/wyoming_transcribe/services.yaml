claim_utterance:
  name: Claim utterance
  description: >-
    Enroll a pending (unrecognized) utterance as a voice sample of a person.
    The person is created automatically if missing. This is the tool for the
    LLM "who are you?" flow — pass the utterance_id from the Transcript event.
    Returns the claimed clip ids and created samples as response data.
  fields:
    name:
      name: Person name
      required: true
      example: "Krzysztof"
      selector:
        text:
    utterance_id:
      name: Utterance id
      required: true
      example: "utt-1783019986769-0f99505f"
      selector:
        text:
    include_cluster:
      name: Include voice cluster
      description: Also claim all other pending clips of the same voice (recommended).
      default: true
      selector:
        boolean:
    host:
      name: Server host
      description: Only needed when multiple Wyoming Transcribe servers are configured.
      required: false
      selector:
        text:

claim_latest:
  name: Claim latest utterance
  description: >-
    Enroll the most recent unrecognized utterance (and all buffered clips of
    the same voice) as a person's samples. The LLM tool for the "who are
    you?" flow — call it right after the person answers with their name; no
    utterance_id needed. Refuses when the newest clip is older than
    max_age_seconds (the answer may have been too short to buffer). Returns
    the claimed clip ids and created samples as response data.
  fields:
    name:
      name: Person name
      required: true
      example: "Anna"
      selector:
        text:
    include_cluster:
      name: Include voice cluster
      description: Also claim all other pending clips of the same voice (recommended).
      default: true
      selector:
        boolean:
    max_age_seconds:
      name: Maximum clip age (seconds)
      description: Refuse to claim when the newest pending clip is older than this.
      default: 300
      selector:
        number:
          min: 10
          max: 3600
          unit_of_measurement: s
    anchor_utterance_id:
      name: Anchor utterance id
      description: >-
        Utterance id returned by check_latest_voice. When set, exactly that
        voice's cluster is claimed — immune to another unknown voice speaking
        between the answer and this call. Recommended in the LLM flow.
      required: false
      example: "utt-1783024610953-c343d5e4"
      selector:
        text:
    host:
      name: Server host
      description: Only needed when multiple Wyoming Transcribe servers are configured.
      required: false
      selector:
        text:

check_latest_voice:
  name: Check latest unrecognized voice
  description: >-
    Regular-visitor check for the "who are you?" flow. Returns stats of the
    newest unrecognized voice's cluster (utterances, seconds, age) and a
    should_ask verdict — ask for a name only when the voice has talked to the
    system a few times. Call before asking; claim with claim_latest after the
    person introduces themselves.
  fields:
    min_utterances:
      name: Minimum utterances
      description: Ask only when this voice has at least this many buffered utterances.
      default: 3
      selector:
        number:
          min: 1
          max: 20
    min_seconds:
      name: Minimum total speech (seconds)
      description: Ask only when the voice's buffered clips total at least this much speech.
      default: 8
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: s
    max_age_seconds:
      name: Maximum anchor age (seconds)
      description: Treat the voice as current only if its newest clip is younger than this.
      default: 300
      selector:
        number:
          min: 10
          max: 3600
          unit_of_measurement: s
    host:
      name: Server host
      description: Only needed when multiple Wyoming Transcribe servers are configured.
      required: false
      selector:
        text:

set_role:
  name: Set speaker role
  description: Set the authorization role of an enrolled person (admin/user/guest).
  fields:
    name:
      name: Person name
      required: true
      example: "Krzysztof"
      selector:
        text:
    role:
      name: Role
      required: true
      selector:
        select:
          options:
            - admin
            - user
            - guest
    host:
      name: Server host
      description: Only needed when multiple Wyoming Transcribe servers are configured.
      required: false
      selector:
        text:
