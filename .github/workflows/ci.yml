name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      # CPU wheels first so `pip install -e .` does not pull the CUDA stack.
      - name: Install torch (CPU)
        run: pip install torch==2.6.0 torchaudio==2.6.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install package
        run: pip install -e . pytest

      - name: Run tests
        # python -m puts the repo root on sys.path (tests import root-level server.py)
        run: python -m pytest -q
