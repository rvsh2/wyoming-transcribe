services:
  wyoming-transcribe:
    image: wyoming-transcribe:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wyoming-transcribe
    restart: unless-stopped
    ports:
      - "0.0.0.0:10300:10300"
      - "0.0.0.0:8580:8580"
    networks:
      - bridge-network
    volumes:
      - /opt/wyoming-transcribe/data:/root/.cache/huggingface
      - /opt/wyoming-transcribe/speakers:/app/speakers
      # Run patched entrypoint code without a full image rebuild (the Dockerfile
      # COPYs code before installing deps, so rebuilding re-downloads torch). The
      # source is committed, so a future `docker compose build` bakes this in and
      # this overlay becomes a harmless no-op. Path is relative to this compose file.
      - ./cohere_wyoming/__main__.py:/app/cohere_wyoming/__main__.py:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=all
      # Speaker identification (diarize -> named speakers via ECAPA enrollment)
      - SPEAKER_ID_ENABLED=true
      - SPEAKER_ENROLLMENT_DIR=/app/speakers
      - SPEAKER_MATCH_THRESHOLD=0.35
      - SPEAKER_MODEL=speechbrain/spkrec-ecapa-voxceleb
      - SPEAKER_MODEL_CACHE=/root/.cache/huggingface/ecapa
      - VAD_ENABLED=true
      - VAD_THRESHOLD=0.54
      - VAD_MIN_SPEECH_DURATION_MS=180
      - VAD_MIN_SILENCE_DURATION_MS=120
      - VAD_SPEECH_PAD_MS=50
      - VAD_MIN_TOTAL_SPEECH_MS=70
      - VAD_MIN_MAX_SEGMENT_MS=45
      - VAD_MIN_SPEECH_RMS=0.014
      - VAD_MIN_SPEECH_TO_NOISE_RATIO=2.6
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["--uri", "tcp://0.0.0.0:10300", "--language", "pl"]

networks:
  bridge-network:
    external: true
