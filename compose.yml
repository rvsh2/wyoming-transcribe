services:
  wyoming-transcribe:
    image: wyoming-transcribe:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wyoming-transcribe
    restart: unless-stopped
    ports:
      - "0.0.0.0:10300:10300"
      # The management API (speaker enrollment, settings) is published on loopback
      # by default. To use the UI from another machine or embed it in Home
      # Assistant (HACS integration / iframe panel), set UI_BIND=0.0.0.0 in
      # .env AND set API_TOKEN — never expose the API without a token.
      - "${UI_BIND:-127.0.0.1}:8580:8580"
    networks:
      - bridge-network
    volumes:
      - ./data:/root/.cache/huggingface
      - ./speakers:/app/speakers
    environment:
      # whisper.cpp server doing the actual speech-to-text.
      - WHISPERCPP_URL=${WHISPERCPP_URL:-http://whispercpp:4050}
      # Label for unenrolled speakers in transcript text (language-specific).
      - SPEAKER_LABEL=Mówca
      # Whisper initial prompt: biases decoding toward household vocabulary.
      # Set the real value (names, rooms, devices) in .env; see .env.example.
      # Nouns/proper names ONLY — example commands here would be echoed back
      # as hallucinations on noisy audio.
      - WHISPER_INITIAL_PROMPT=${WHISPER_INITIAL_PROMPT:-}
      # Cache for the (public) ECAPA and Silero models.
      - HF_HOME=/root/.cache/huggingface
      - NVIDIA_VISIBLE_DEVICES=all
      # Optional auth for the management API on 8580 (empty = disabled; the
      # loopback-only port publishing is then the safety boundary).
      - API_TOKEN=${API_TOKEN:-}
      # How speaker identity reaches the HA pipeline: prefix | field | both
      # (default "prefix"; changeable at runtime in the UI settings card).
      - SPEAKER_TEXT_MODE=${SPEAKER_TEXT_MODE:-prefix}
      # Speaker identification (named speakers via ECAPA enrollment)
      - SPEAKER_ID_ENABLED=true
      - SPEAKER_ENROLLMENT_DIR=/app/speakers
      - SPEAKER_MATCH_THRESHOLD=0.35
      - SPEAKER_MODEL=speechbrain/spkrec-ecapa-voxceleb
      - SPEAKER_MODEL_CACHE=/root/.cache/huggingface/ecapa
      - VAD_ENABLED=true
      - VAD_THRESHOLD=0.54
      - VAD_MIN_SPEECH_DURATION_MS=180
      - VAD_MIN_SILENCE_DURATION_MS=120
      - VAD_SPEECH_PAD_MS=50
      - VAD_MIN_TOTAL_SPEECH_MS=70
      - VAD_MIN_MAX_SEGMENT_MS=45
      # 0.014 silently rejected real far-field speech (quiet command rms 0.013
      # vs near 0.06); the Jabra noise floor is ~0.0001, so 0.007 stays safe.
      - VAD_MIN_SPEECH_RMS=0.007
      - VAD_MIN_SPEECH_TO_NOISE_RATIO=2.6
    healthcheck:
      # asr_ready covers the whole chain: whisper.cpp reachable AND the
      # Wyoming process accepting — a dead STT engine flips the container
      # to unhealthy instead of silently returning empty transcripts.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8580/health | grep -q '\"asr_ready\":true'"]
      interval: 30s
      timeout: 5s
      retries: 5
      # The ASR model load + warmup can take a while on first start.
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["--uri", "tcp://0.0.0.0:10300", "--language", "pl"]

networks:
  bridge-network:
    external: true
